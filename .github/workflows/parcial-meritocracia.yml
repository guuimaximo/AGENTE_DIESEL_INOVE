name: parcial-meritocracia
run-name: Parcial Meritocracia - Mês ${{ inputs.mes_referencia }}

on:
  workflow_dispatch:
    inputs:
      mes_referencia:
        description: "Mês de referência (YYYY-MM)"
        required: true
        type: string

jobs:
  gerar-parcial:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_A_URL: ${{ secrets.SUPABASE_A_URL }}
      SUPABASE_A_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_A_SERVICE_ROLE_KEY }}
      MES_REFERENCIA: ${{ github.event.inputs.mes_referencia }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validar mês de referência
        run: |
          if ! [[ "${MES_REFERENCIA}" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
            echo "MES_REFERENCIA inválido: ${MES_REFERENCIA}"
            echo "Use o formato YYYY-MM. Exemplo: 2026-03"
            exit 1
          fi

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install pandas supabase playwright pypdf

      - name: Instalar Chromium do Playwright
        run: |
          python -m playwright install --with-deps chromium

      - name: Criar pasta de saída
        run: mkdir -p "Parcial_Meritocracia/${MES_REFERENCIA}"

      - name: Executar script da parcial mensal
        run: |
          python scripts/parcial_meritocracia.py

      - name: Listar arquivos gerados
        if: always()
        run: |
          echo "Arquivos gerados:"
          find "Parcial_Meritocracia/${MES_REFERENCIA}" -maxdepth 3 -type f | sort || true

      - name: Publicar artefatos gerados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parcial-meritocracia-${{ github.event.inputs.mes_referencia }}
          path: Parcial_Meritocracia/${{ github.event.inputs.mes_referencia }}/
          if-no-files-found: warn
