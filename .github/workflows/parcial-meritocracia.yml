name: parcial-meritocracia
run-name: Parcial Meritocracia - Mês ${{ inputs.mes_referencia || 'atual' }}

on:
  schedule:
    # Roda todo dia às 09:00 UTC (06:00 no horário de Brasília).
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      mes_referencia:
        description: "Mês de referência (YYYY-MM). Vazio = mês atual."
        required: false
        default: ""
        type: string
      chapas_excluir:
        description: "Chapas para excluir da parcial, separadas por vírgula"
        required: false
        default: ""
        type: string

jobs:
  gerar-parcial:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_A_URL: ${{ secrets.SUPABASE_A_URL }}
      SUPABASE_A_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_A_SERVICE_ROLE_KEY }}
      CHAPAS_EXCLUIR: ${{ github.event.inputs.chapas_excluir }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Definir mês de referência
        run: |
          MES_INPUT="${{ github.event.inputs.mes_referencia }}"
          if [[ -z "${MES_INPUT}" ]]; then
            # Execução agendada (ou manual sem mês): usa o mês atual (UTC).
            MES_INPUT="$(date -u +%Y-%m)"
            echo "Mês não informado. Usando mês atual: ${MES_INPUT}"
          fi
          if ! [[ "${MES_INPUT}" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
            echo "MES_REFERENCIA inválido: ${MES_INPUT}"
            echo "Use o formato YYYY-MM. Exemplo: 2026-03"
            exit 1
          fi
          echo "MES_REFERENCIA=${MES_INPUT}" >> "$GITHUB_ENV"

      - name: Exibir parâmetros da execução
        run: |
          echo "MES_REFERENCIA=${MES_REFERENCIA}"
          echo "CHAPAS_EXCLUIR=${CHAPAS_EXCLUIR}"

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install pandas supabase playwright pypdf

      - name: Instalar Chromium do Playwright
        run: |
          python -m playwright install --with-deps chromium

      - name: Criar pasta de saída
        run: mkdir -p "Parcial_Meritocracia/${MES_REFERENCIA}"

      - name: Executar script da parcial mensal
        run: |
          python scripts/parcial_meritocracia.py

      - name: Listar arquivos gerados
        if: always()
        run: |
          echo "Arquivos gerados:"
          find "Parcial_Meritocracia/${MES_REFERENCIA}" -maxdepth 3 -type f | sort || true

      - name: Publicar artefatos gerados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parcial-meritocracia-${{ env.MES_REFERENCIA }}
          path: Parcial_Meritocracia/${{ env.MES_REFERENCIA }}/
          if-no-files-found: warn
