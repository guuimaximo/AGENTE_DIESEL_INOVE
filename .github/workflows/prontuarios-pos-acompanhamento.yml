name: Prontuários Pós-Acompanhamento

on:
  workflow_dispatch:
    inputs:
      prontuario_lote_id:
        description: "ID do lote com prontuarios pendentes em acompanhamento_lotes"
        required: false
      qtd:
        description: "Quantidade de prontuarios"
        required: false
        default: "0"
  schedule:
    - cron: "15 10 * * *"

jobs:
  gerar:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      # --- Supabase A (origem dos dados diesel) ---
      SUPABASE_A_URL: ${{ secrets.SUPABASE_A_URL }}
      SUPABASE_A_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_A_SERVICE_ROLE_KEY }}

      # --- Supabase B (controle / destino / storage) ---
      SUPABASE_B_URL: ${{ secrets.SUPABASE_B_URL }}
      SUPABASE_B_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_B_SERVICE_ROLE_KEY }}

      # Compatibilidade para scripts antigos
      SUPABASE_URL: ${{ secrets.SUPABASE_B_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_B_SERVICE_ROLE_KEY }}

      # Origem dos dados diesel
      DIESEL_SOURCE_TABLE: premiacao_diaria_atualizada

      REPORT_BUCKET: relatorios
      REPORT_REMOTE_PREFIX: acompanhamento_pos
      REPORT_OUTPUT_DIR: Prontuarios_Pos_Acompanhamento

      VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
      VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
      VERTEX_MODEL: ${{ secrets.VERTEX_MODEL }}
      VERTEX_SA_JSON: ${{ secrets.VERTEX_SA_JSON }}

      PRONTUARIO_LOTE_ID: ${{ github.event.inputs.prontuario_lote_id }}
      PRONTUARIO_BATCH_ID: ${{ github.event.inputs.prontuario_lote_id || github.run_id }}
      QTD: ${{ github.event.inputs.qtd }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas supabase playwright google-cloud-aiplatform vertexai

      - name: Install Chromium
        run: |
          set -euo pipefail
          python -m playwright install --with-deps chromium

      - name: Check env (safe)
        run: |
          set -euo pipefail
          python - << 'PY'
          import os
          keys = [
            "SUPABASE_A_URL","SUPABASE_A_SERVICE_ROLE_KEY",
            "SUPABASE_B_URL","SUPABASE_B_SERVICE_ROLE_KEY",
            "DIESEL_SOURCE_TABLE",
            "REPORT_BUCKET","REPORT_REMOTE_PREFIX","REPORT_OUTPUT_DIR",
            "VERTEX_PROJECT_ID","VERTEX_LOCATION","VERTEX_MODEL",
            "VERTEX_SA_JSON",
            "PRONTUARIO_BATCH_ID",
          ]
          for k in keys:
            print(f"{k}={'OK' if os.getenv(k) else 'MISSING'}")
          PY

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.VERTEX_SA_JSON }}

      - name: Run script
        run: |
          set -euo pipefail
          echo "Rodando gerar_prontuarios_pos_acompanhamento.py | BATCH=$PRONTUARIO_BATCH_ID | TABELA=$DIESEL_SOURCE_TABLE"
          python -u scripts/gerar_prontuarios_pos_acompanhamento.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prontuarios-pos-acompanhamento
          path: |
            Prontuarios_Pos_Acompanhamento/**
            *.log
