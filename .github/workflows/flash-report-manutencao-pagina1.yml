name: Flash Report Manutenção - Página 1

on:
  workflow_dispatch:
    inputs:
      periodo_inicio:
        description: "YYYY-MM-DD"
        required: true
      periodo_fim:
        description: "YYYY-MM-DD"
        required: true
      report_tipo:
        description: "tipo (flash_report_manutencao)"
        required: false
        default: "flash_report_manutencao"

jobs:
  gerar:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      SUPABASE_B_URL: ${{ secrets.SUPABASE_B_URL }}
      SUPABASE_B_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_B_SERVICE_ROLE_KEY }}

      SUPABASE_URL: ${{ secrets.SUPABASE_B_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_B_SERVICE_ROLE_KEY }}

      REPORT_TIPO: ${{ inputs.report_tipo }}
      REPORT_PERIODO_INICIO: ${{ inputs.periodo_inicio }}
      REPORT_PERIODO_FIM: ${{ inputs.periodo_fim }}
      REPORT_BUCKET: relatorios
      REPORT_OUTPUT_DIR: Relatorios_Manutencao
      REPORT_REMOTE_PREFIX: manutencao

      MKBF_META: "7000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-flash-manutencao.txt

      - name: Install Chromium (Playwright)
        run: |
          set -euo pipefail
          python -m playwright install --with-deps chromium

      - name: Check env (safe)
        run: |
          set -euo pipefail
          python - << 'PY'
          import os
          keys = [
            "SUPABASE_B_URL","SUPABASE_B_SERVICE_ROLE_KEY",
            "REPORT_TIPO","REPORT_PERIODO_INICIO","REPORT_PERIODO_FIM",
            "REPORT_BUCKET","REPORT_OUTPUT_DIR","REPORT_REMOTE_PREFIX","MKBF_META",
          ]
          for k in keys:
            v = os.getenv(k)
            print(f"{k}={'OK' if v else 'MISSING'}")
          PY

      - name: Run Flash Report Manutenção Página 1
        run: |
          set -euo pipefail
          echo "Rodando flash_report_manutencao_pagina_1.py | TIPO=$REPORT_TIPO | INI=$REPORT_PERIODO_INICIO | FIM=$REPORT_PERIODO_FIM"
          python -u scripts/flash_report_manutencao_pagina_1.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flash-report-manutencao-pagina-1
          path: |
            Relatorios_Manutencao/**
            *.log
